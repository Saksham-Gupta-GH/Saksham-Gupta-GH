<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <!-- CRT scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>

  <style>
    /* Pixel-perfect rendering */
    svg { shape-rendering: crispEdges; image-rendering: pixelated; }

    /* Launch trails - pixel dashes rising up */
    @keyframes rise1 { 0%{opacity:0} 5%{opacity:1} 25%{opacity:1} 30%{opacity:0} 100%{opacity:0} }
    @keyframes rise2 { 0%{opacity:0} 20%{opacity:0} 25%{opacity:1} 45%{opacity:1} 50%{opacity:0} 100%{opacity:0} }
    @keyframes rise3 { 0%{opacity:0} 40%{opacity:0} 45%{opacity:1} 65%{opacity:1} 70%{opacity:0} 100%{opacity:0} }

    /* Pixel bursts */
    @keyframes pop1 { 0%{opacity:0} 28%{opacity:0} 32%{opacity:1} 65%{opacity:1} 80%{opacity:0.4} 90%{opacity:0} 100%{opacity:0} }
    @keyframes pop2 { 0%{opacity:0} 48%{opacity:0} 52%{opacity:1} 78%{opacity:1} 90%{opacity:0.4} 95%{opacity:0} 100%{opacity:0} }
    @keyframes pop3 { 0%{opacity:0} 68%{opacity:0} 72%{opacity:1} 92%{opacity:1} 97%{opacity:0.4} 100%{opacity:0} }

    /* Flicker effect for pixels */
    @keyframes flicker { 0%{opacity:1} 50%{opacity:0.6} 100%{opacity:1} }

    /* Twinkle for stars */
    @keyframes twinkle { 0%{opacity:0.2} 50%{opacity:1} 100%{opacity:0.2} }

    /* Cursor blink */
    @keyframes blink { 0%{opacity:1} 49%{opacity:1} 50%{opacity:0} 100%{opacity:0} }

    .t1 { animation: rise1 5s ease-out infinite; }
    .t2 { animation: rise2 5s ease-out infinite; }
    .t3 { animation: rise3 5s ease-out infinite; }
    .fw1 { animation: pop1 5s ease-out infinite; }
    .fw2 { animation: pop2 5s ease-out infinite; }
    .fw3 { animation: pop3 5s ease-out infinite; }
    .fl { animation: flicker 0.3s steps(2) infinite; }
    .star { animation: twinkle 2s steps(3) infinite; }
    .cur { animation: blink 1s steps(1) infinite; }
  </style>

  <!-- Dark arcade background -->
  <rect width="800" height="320" fill="#0a0a0a" rx="8"/>

  <!-- CRT scanlines overlay -->
  <rect width="800" height="320" fill="url(#scanlines)" rx="8"/>

  <!-- Subtle grid lines for retro feel -->
  <g opacity="0.04" stroke="#4285F4">
    <line x1="0" y1="40" x2="800" y2="40" stroke-dasharray="2,6"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke-dasharray="2,6"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke-dasharray="2,6"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke-dasharray="2,6"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke-dasharray="2,6"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke-dasharray="2,6"/>
  </g>

  <!-- ═══ TRAIL 1 (left) ═══ -->
  <g class="t1">
    <rect x="178" y="220" width="4" height="4" fill="#4285F4"/>
    <rect x="178" y="210" width="4" height="4" fill="#4285F4"/>
    <rect x="178" y="200" width="4" height="4" fill="#4285F4" opacity="0.8"/>
    <rect x="178" y="190" width="4" height="4" fill="#4285F4" opacity="0.6"/>
    <rect x="178" y="180" width="4" height="4" fill="#4285F4" opacity="0.4"/>
    <rect x="178" y="170" width="4" height="4" fill="#4285F4" opacity="0.2"/>
  </g>

  <!-- ═══ TRAIL 2 (center) ═══ -->
  <g class="t2">
    <rect x="398" y="220" width="4" height="4" fill="#EA4335"/>
    <rect x="398" y="210" width="4" height="4" fill="#EA4335"/>
    <rect x="398" y="200" width="4" height="4" fill="#EA4335" opacity="0.8"/>
    <rect x="398" y="190" width="4" height="4" fill="#EA4335" opacity="0.6"/>
    <rect x="398" y="180" width="4" height="4" fill="#EA4335" opacity="0.4"/>
    <rect x="398" y="170" width="4" height="4" fill="#EA4335" opacity="0.2"/>
  </g>

  <!-- ═══ TRAIL 3 (right) ═══ -->
  <g class="t3">
    <rect x="618" y="220" width="4" height="4" fill="#34A853"/>
    <rect x="618" y="210" width="4" height="4" fill="#34A853"/>
    <rect x="618" y="200" width="4" height="4" fill="#34A853" opacity="0.8"/>
    <rect x="618" y="190" width="4" height="4" fill="#34A853" opacity="0.6"/>
    <rect x="618" y="180" width="4" height="4" fill="#34A853" opacity="0.4"/>
    <rect x="618" y="170" width="4" height="4" fill="#34A853" opacity="0.2"/>
  </g>

  <!-- ═══ FIREWORK 1 — BLUE pixel burst ═══ -->
  <g class="fw1">
    <!-- Core -->
    <rect x="176" y="98" width="8" height="8" fill="#fff"/>
    <!-- Ring 1 -->
    <rect x="176" y="82" width="8" height="6" fill="#4285F4"/>
    <rect x="176" y="116" width="8" height="6" fill="#4285F4"/>
    <rect x="160" y="98" width="6" height="8" fill="#4285F4"/>
    <rect x="194" y="98" width="6" height="8" fill="#4285F4"/>
    <!-- Diagonals -->
    <rect x="164" y="86" width="6" height="6" fill="#4285F4"/>
    <rect x="190" y="86" width="6" height="6" fill="#4285F4"/>
    <rect x="164" y="112" width="6" height="6" fill="#4285F4"/>
    <rect x="190" y="112" width="6" height="6" fill="#4285F4"/>
    <!-- Outer sparks -->
    <rect x="176" y="70" width="4" height="4" fill="#4285F4" class="fl" opacity="0.7"/>
    <rect x="176" y="128" width="4" height="4" fill="#4285F4" class="fl" opacity="0.7"/>
    <rect x="148" y="98" width="4" height="4" fill="#4285F4" class="fl" opacity="0.7"/>
    <rect x="208" y="98" width="4" height="4" fill="#4285F4" class="fl" opacity="0.7"/>
    <rect x="152" y="78" width="4" height="4" fill="#83b4f5" class="fl" opacity="0.5"/>
    <rect x="204" y="78" width="4" height="4" fill="#83b4f5" class="fl" opacity="0.5"/>
    <rect x="152" y="122" width="4" height="4" fill="#83b4f5" class="fl" opacity="0.5"/>
    <rect x="204" y="122" width="4" height="4" fill="#83b4f5" class="fl" opacity="0.5"/>
    <!-- Extra outer pixels -->
    <rect x="176" y="62" width="3" height="3" fill="#83b4f5" opacity="0.4"/>
    <rect x="176" y="136" width="3" height="3" fill="#83b4f5" opacity="0.4"/>
    <rect x="140" y="98" width="3" height="3" fill="#83b4f5" opacity="0.4"/>
    <rect x="218" y="98" width="3" height="3" fill="#83b4f5" opacity="0.4"/>
  </g>

  <!-- ═══ FIREWORK 2 — RED/YELLOW pixel burst ═══ -->
  <g class="fw2">
    <!-- Core -->
    <rect x="396" y="78" width="8" height="8" fill="#fff"/>
    <!-- Ring 1 -->
    <rect x="396" y="62" width="8" height="6" fill="#EA4335"/>
    <rect x="396" y="96" width="8" height="6" fill="#EA4335"/>
    <rect x="380" y="78" width="6" height="8" fill="#EA4335"/>
    <rect x="414" y="78" width="6" height="8" fill="#EA4335"/>
    <!-- Diagonals -->
    <rect x="384" y="66" width="6" height="6" fill="#FBBC04"/>
    <rect x="410" y="66" width="6" height="6" fill="#FBBC04"/>
    <rect x="384" y="92" width="6" height="6" fill="#FBBC04"/>
    <rect x="410" y="92" width="6" height="6" fill="#FBBC04"/>
    <!-- Outer sparks -->
    <rect x="396" y="50" width="4" height="4" fill="#EA4335" class="fl" opacity="0.7"/>
    <rect x="396" y="108" width="4" height="4" fill="#EA4335" class="fl" opacity="0.7"/>
    <rect x="368" y="78" width="4" height="4" fill="#EA4335" class="fl" opacity="0.7"/>
    <rect x="428" y="78" width="4" height="4" fill="#EA4335" class="fl" opacity="0.7"/>
    <rect x="372" y="58" width="4" height="4" fill="#FBBC04" class="fl" opacity="0.5"/>
    <rect x="424" y="58" width="4" height="4" fill="#FBBC04" class="fl" opacity="0.5"/>
    <rect x="372" y="102" width="4" height="4" fill="#FBBC04" class="fl" opacity="0.5"/>
    <rect x="424" y="102" width="4" height="4" fill="#FBBC04" class="fl" opacity="0.5"/>
    <!-- Extra outer pixels -->
    <rect x="396" y="42" width="3" height="3" fill="#f5a6a0" opacity="0.4"/>
    <rect x="396" y="116" width="3" height="3" fill="#f5a6a0" opacity="0.4"/>
    <rect x="360" y="78" width="3" height="3" fill="#f5a6a0" opacity="0.4"/>
    <rect x="438" y="78" width="3" height="3" fill="#f5a6a0" opacity="0.4"/>
  </g>

  <!-- ═══ FIREWORK 3 — GREEN pixel burst ═══ -->
  <g class="fw3">
    <!-- Core -->
    <rect x="616" y="88" width="8" height="8" fill="#fff"/>
    <!-- Ring 1 -->
    <rect x="616" y="72" width="8" height="6" fill="#34A853"/>
    <rect x="616" y="106" width="8" height="6" fill="#34A853"/>
    <rect x="600" y="88" width="6" height="8" fill="#34A853"/>
    <rect x="634" y="88" width="6" height="8" fill="#34A853"/>
    <!-- Diagonals -->
    <rect x="604" y="76" width="6" height="6" fill="#34A853"/>
    <rect x="630" y="76" width="6" height="6" fill="#34A853"/>
    <rect x="604" y="102" width="6" height="6" fill="#34A853"/>
    <rect x="630" y="102" width="6" height="6" fill="#34A853"/>
    <!-- Outer sparks -->
    <rect x="616" y="60" width="4" height="4" fill="#34A853" class="fl" opacity="0.7"/>
    <rect x="616" y="118" width="4" height="4" fill="#34A853" class="fl" opacity="0.7"/>
    <rect x="588" y="88" width="4" height="4" fill="#34A853" class="fl" opacity="0.7"/>
    <rect x="648" y="88" width="4" height="4" fill="#34A853" class="fl" opacity="0.7"/>
    <rect x="592" y="68" width="4" height="4" fill="#81c995" class="fl" opacity="0.5"/>
    <rect x="644" y="68" width="4" height="4" fill="#81c995" class="fl" opacity="0.5"/>
    <rect x="592" y="112" width="4" height="4" fill="#81c995" class="fl" opacity="0.5"/>
    <rect x="644" y="112" width="4" height="4" fill="#81c995" class="fl" opacity="0.5"/>
    <!-- Extra outer pixels -->
    <rect x="616" y="52" width="3" height="3" fill="#81c995" opacity="0.4"/>
    <rect x="616" y="126" width="3" height="3" fill="#81c995" opacity="0.4"/>
    <rect x="580" y="88" width="3" height="3" fill="#81c995" opacity="0.4"/>
    <rect x="658" y="88" width="3" height="3" fill="#81c995" opacity="0.4"/>
  </g>

  <!-- ═══ RETRO PIXEL STARS ═══ -->
  <!-- Each star is a tiny cross pattern -->
  <g class="star" style="animation-delay:0s">
    <rect x="100" y="50" width="4" height="2" fill="#FBBC04"/><rect x="101" y="49" width="2" height="4" fill="#FBBC04"/>
  </g>
  <g class="star" style="animation-delay:0.6s">
    <rect x="310" y="40" width="4" height="2" fill="#4285F4"/><rect x="311" y="39" width="2" height="4" fill="#4285F4"/>
  </g>
  <g class="star" style="animation-delay:1.2s">
    <rect x="500" y="55" width="4" height="2" fill="#EA4335"/><rect x="501" y="54" width="2" height="4" fill="#EA4335"/>
  </g>
  <g class="star" style="animation-delay:0.3s">
    <rect x="700" y="45" width="4" height="2" fill="#34A853"/><rect x="701" y="44" width="2" height="4" fill="#34A853"/>
  </g>
  <g class="star" style="animation-delay:0.9s">
    <rect x="60" y="140" width="4" height="2" fill="#4285F4"/><rect x="61" y="139" width="2" height="4" fill="#4285F4"/>
  </g>
  <g class="star" style="animation-delay:1.5s">
    <rect x="740" y="130" width="4" height="2" fill="#FBBC04"/><rect x="741" y="129" width="2" height="4" fill="#FBBC04"/>
  </g>
  <g class="star" style="animation-delay:0.4s">
    <rect x="280" y="150" width="3" height="2" fill="#34A853"/><rect x="280" y="149" width="2" height="4" fill="#34A853"/>
  </g>
  <g class="star" style="animation-delay:1.1s">
    <rect x="530" y="145" width="3" height="2" fill="#EA4335"/><rect x="530" y="144" width="2" height="4" fill="#EA4335"/>
  </g>

  <!-- ═══ GROUND LINE ═══ -->
  <rect x="40" y="240" width="720" height="2" fill="#222" opacity="0.8"/>
  <rect x="40" y="242" width="720" height="1" fill="#333" opacity="0.4"/>

  <!-- ═══ RETRO TERMINAL TEXT ═══ -->
  <text x="400" y="272" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="13" fill="#4285F4" letter-spacing="2">
    THANKS FOR VISITING! STAR A REPO TO LAUNCH MORE
  </text>
  <text x="400" y="292" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="13" fill="#5f6368" letter-spacing="2">
    &gt; PRESS START_<tspan class="cur" fill="#4285F4">█</tspan>
  </text>

  <!-- ═══ GOOGLE DOTS at bottom ═══ -->
  <rect x="370" y="305" width="6" height="6" fill="#4285F4" rx="0"/>
  <rect x="382" y="305" width="6" height="6" fill="#EA4335" rx="0"/>
  <rect x="394" y="305" width="6" height="6" fill="#FBBC04" rx="0"/>
  <rect x="406" y="305" width="6" height="6" fill="#34A853" rx="0"/>
  <rect x="418" y="305" width="6" height="6" fill="#4285F4" rx="0"/>
  <rect x="430" y="305" width="6" height="6" fill="#EA4335" rx="0"/>
</svg>
