  <text x="128" y="238" font-family="'Courier New',monospace" font-size="8" fill="#2a2a3a">↑   ROTATE</text>
  <text x="128" y="251" font-family="'Courier New',monospace" font-size="8" fill="#2a2a3a">↓   SOFT DROP</text>
  <text x="128" y="264" font-family="'Courier New',monospace" font-size="8" fill="#2a2a3a">SPC HARD DROP</text>

